<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c1810"/>
      <stop offset="100%" style="stop-color:#4a3228"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6F47"/>
      <stop offset="100%" style="stop-color:#C4A87C"/>
    </linearGradient>
    <linearGradient id="cupGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0ebe3"/>
    </linearGradient>
  </defs>
  
  <!-- Circular Background -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)" stroke="#8B6F47" stroke-width="2"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#8B6F47" stroke-width="0.5" opacity="0.4"/>
  
  <!-- Olive/Leaf Branch - Left -->
  <g transform="translate(100,58)">
    <ellipse cx="-20" cy="-10" rx="12" ry="5" fill="url(#leafGrad)" transform="rotate(-40,-20,-10)" opacity="0.9"/>
    <ellipse cx="-8" cy="-18" rx="10" ry="4.5" fill="url(#leafGrad)" transform="rotate(-15,-8,-18)" opacity="0.8"/>
    <ellipse cx="8" cy="-22" rx="10" ry="4.5" fill="url(#leafGrad)" transform="rotate(10,8,-22)" opacity="0.85"/>
    <ellipse cx="20" cy="-18" rx="10" ry="4.5" fill="url(#leafGrad)" transform="rotate(30,20,-18)" opacity="0.8"/>
    <!-- Stem -->
    <path d="M-28,-4 Q-10,-20 28,-12" fill="none" stroke="#8B6F47" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Coffee Cup -->
  <g transform="translate(100,105)">
    <!-- Saucer -->
    <ellipse cx="0" cy="28" rx="32" ry="8" fill="#d4c5a9" opacity="0.5"/>
    
    <!-- Cup Body -->
    <path d="M-24,-10 L-20,24 Q-18,30 0,30 Q18,30 20,24 L24,-10 Z" fill="url(#cupGrad)" stroke="#C4A87C" stroke-width="1"/>
    
    <!-- Cup Handle -->
    <path d="M24,-4 Q38,-2 36,12 Q34,24 22,22" fill="none" stroke="#C4A87C" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Coffee surface -->
    <ellipse cx="0" cy="-10" rx="24" ry="7" fill="#6B4226" opacity="0.8"/>
    <ellipse cx="-2" cy="-11" rx="18" ry="5" fill="#8B5E3C" opacity="0.4"/>
    
    <!-- Steam -->
    <path d="M-8,-22 Q-10,-32 -6,-38 Q-2,-44 -6,-52" fill="none" stroke="#C4A87C" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
      <animate attributeName="d" values="M-8,-22 Q-10,-32 -6,-38 Q-2,-44 -6,-52;M-8,-22 Q-6,-32 -10,-38 Q-6,-44 -8,-52;M-8,-22 Q-10,-32 -6,-38 Q-2,-44 -6,-52" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.3;0.5" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M2,-20 Q4,-30 0,-36 Q-4,-42 2,-50" fill="none" stroke="#C4A87C" stroke-width="1.5" stroke-linecap="round" opacity="0.4">
      <animate attributeName="d" values="M2,-20 Q4,-30 0,-36 Q-4,-42 2,-50;M2,-20 Q0,-30 4,-36 Q0,-42 2,-50;M2,-20 Q4,-30 0,-36 Q-4,-42 2,-50" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.2;0.4" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M12,-21 Q14,-30 10,-36 Q6,-42 12,-48" fill="none" stroke="#C4A87C" stroke-width="1.2" stroke-linecap="round" opacity="0.35">
      <animate attributeName="d" values="M12,-21 Q14,-30 10,-36 Q6,-42 12,-48;M12,-21 Q10,-30 14,-36 Q10,-42 12,-48;M12,-21 Q14,-30 10,-36 Q6,-42 12,-48" dur="3.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- "NOA" Text -->
  <text x="100" y="170" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#C4A87C" letter-spacing="6">NOA</text>
  
  <!-- "CAFFE & CO" Text -->
  <text x="100" y="184" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#8B6F47" letter-spacing="3" opacity="0.8">CAFFE &amp; CO</text>
</svg>
