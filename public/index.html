<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>NOA caffé & co | Menü</title>
    <meta name="theme-color" content="#3b2516">
    <meta property="og:title" content="NOA caffé & co">
    <meta property="og:description" content="Kahve & Fast Food - Cumhuriyet Caddesi, Bursa">
    <meta property="og:image" content="/logo.png">
    <link rel="stylesheet" href="/css/menu.css">
    <link rel="icon" type="image/png" href="/logo.png">
</head>
<body>

    <div class="loader" id="loader"><span></span></div>

    <div id="app">
        <!-- Kapak -->
        <div class="page start" id="pageCover">
            <div class="cover" id="coverBg"></div>
            <div class="cover-name" id="coverName"></div>
            <div class="gomain">
                <a id="btnMenu">MENÜ</a>
            </div>
        </div>

        <!-- Kategoriler -->
        <div class="page main hide" id="pageCats">
            <div class="topbar">
                <button class="backbtn2" id="backCover" aria-label="Geri">&#8592;</button>
                <h1>Menü</h1>
            </div>
            <p class="menualtitxt" id="menuNote">Güncel menümüze buradan ulaşabilirsiniz.</p>
            <div class="gruplar">
                <ul id="catGrid"></ul>
            </div>
            <p class="foot-kdv">Fiyatlarımıza KDV dahildir.</p>
        </div>

        <!-- Ürünler -->
        <div class="page main hide" id="pageItems">
            <div class="topbar">
                <button class="backbtn2" id="backCats" aria-label="Geri">&#8592;</button>
                <h1 id="itemsTopTitle"></h1>
            </div>
            <div class="grpadi">
                <div class="grupbaslik" id="grpTitle"></div>
            </div>
            <div class="urunler">
                <ul id="itemList"></ul>
            </div>
        </div>

        <!-- Ürün detay -->
        <div class="page urun hide" id="pageDetail">
            <div class="topbar">
                <button class="backbtn2" id="backItems" aria-label="Geri">&#8592;</button>
                <h1>Ürün</h1>
            </div>
            <div class="detay" id="detailBox"></div>
        </div>
    </div>

    <div class="orient" id="orient">
        <div>
            <h4 id="orientName">NOA caffé & co</h4>
            <span>Lütfen cihazınızı dik konumda kullanınız.</span>
        </div>
    </div>

    <script src="/js/menu.js"></script>
</body>
</html>
